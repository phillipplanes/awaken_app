[platformio]
; Default to the attached Adafruit Feather ESP32 V2.
; It uses original ESP32 silicon, so BLE + Bluetooth Classic A2DP are both supported.
default_envs = adafruit_feather_esp32_v2_hybrid

[env:adafruit_feather_esp32s3_tft]
platform = espressif32
board = adafruit_feather_esp32s3_tft
framework = arduino

build_src_filter =
    +<main.cpp>

; ESP32-S3 USB CDC for Serial over USB
build_flags =
    -DTARGET_BOARD_ESP32S3_FEATHER_TFT
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; Library dependencies
lib_deps =
    arduino-libraries/NTPClient
    adafruit/Adafruit ST7735 and ST7789 Library
    adafruit/Adafruit GFX Library
    adafruit/Adafruit DRV2605 Library
    adafruit/Adafruit BusIO
; MAX98357A uses built-in ESP-IDF I2S driver (driver/i2s.h), no extra lib needed

; Use a different partition scheme to increase available program space
; This disables OTA updates but provides a larger app partition.
board_build.partitions = no_ota.csv
board_build.filesystem = spiffs
; Upload SPIFFS data: pio run -d awaken/firmware --target uploadfs

; Serial Monitor options to match Serial.begin() in the code
monitor_speed = 115200

[env:adafruit_feather_esp32_v2]
platform = espressif32
board = adafruit_feather_esp32_v2
framework = arduino

build_src_filter =
    +<main.cpp>

build_flags =
    -DTARGET_BOARD_ADAFRUIT_FEATHER_ESP32_V2

lib_deps =
    arduino-libraries/NTPClient
    adafruit/Adafruit ST7735 and ST7789 Library
    adafruit/Adafruit GFX Library
    adafruit/Adafruit DRV2605 Library
    adafruit/Adafruit BusIO

board_build.partitions = no_ota.csv
board_build.filesystem = spiffs
monitor_speed = 115200

[env:adafruit_feather_esp32_v2_a2dp]
platform = espressif32
board = adafruit_feather_esp32_v2
framework = arduino

build_src_filter =
    +<main_a2dp.cpp>

build_flags =
    -DTARGET_BOARD_ADAFRUIT_FEATHER_ESP32_V2

lib_deps =
    https://github.com/pschatzmann/ESP32-A2DP.git

monitor_speed = 115200

[env:adafruit_feather_esp32_v2_hybrid]
platform = espressif32
board = adafruit_feather_esp32_v2
framework = arduino

; Uses original ESP32 silicon, so BLE and Bluetooth Classic A2DP can run together.
build_src_filter =
    +<main_hybrid.cpp>

build_flags =
    -DTARGET_BOARD_ADAFRUIT_FEATHER_ESP32_V2

lib_deps =
    https://github.com/pschatzmann/ESP32-A2DP.git
    arduino-libraries/NTPClient
    adafruit/Adafruit DRV2605 Library
    adafruit/Adafruit BusIO

board_build.partitions = no_ota.csv
board_build.filesystem = spiffs
monitor_speed = 115200

[env:esp32_wroom_32e]
platform = espressif32
board = esp32dev
framework = arduino

build_src_filter =
    +<main.cpp>

build_flags =
    -DTARGET_BOARD_ESP32_WROOM_32E

; Library dependencies
lib_deps =
    arduino-libraries/NTPClient
    adafruit/Adafruit ST7735 and ST7789 Library
    adafruit/Adafruit GFX Library
    adafruit/Adafruit DRV2605 Library
    adafruit/Adafruit BusIO

board_build.partitions = no_ota.csv
board_build.filesystem = spiffs
monitor_speed = 115200

[env:esp32_wroom_32e_a2dp]
platform = espressif32
board = esp32dev
framework = arduino

build_src_filter =
    +<main_a2dp.cpp>

lib_deps =
    https://github.com/pschatzmann/ESP32-A2DP.git

monitor_speed = 115200

[env:esp32_wroom_32e_hybrid]
platform = espressif32
board = esp32dev
framework = arduino

; Uses classic Bluetooth A2DP, which is supported on the original ESP32
; but not on ESP32-S3 hardware.

build_src_filter =
    +<main_hybrid.cpp>

lib_deps =
    https://github.com/pschatzmann/ESP32-A2DP.git
    arduino-libraries/NTPClient
    adafruit/Adafruit DRV2605 Library
    adafruit/Adafruit BusIO

board_build.partitions = no_ota.csv
monitor_speed = 115200
